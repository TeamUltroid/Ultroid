name: QoL smoke

on:
  push:
    paths:
      - "pyUltroid/**"
      - "tests/**"
      - "requirements*.txt"
      - ".github/workflows/qol-smoke.yml"
  pull_request:
    paths:
      - "pyUltroid/**"
      - "tests/**"
      - "requirements*.txt"
      - ".github/workflows/qol-smoke.yml"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: |
          python -m pip install -U pip
          pip install python-decouple python-dotenv
      - name: Run P0/P1 unit tests
        run: python -m unittest discover -s tests -v
      - name: CLI doctor (no full boot)
        run: python -m pyUltroid doctor || true
      - name: CLI help
        run: python -m pyUltroid --help
